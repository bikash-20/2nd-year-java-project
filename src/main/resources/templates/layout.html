<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — Rentify'">Rentify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a href="/" class="nav-logo">🚗 Rentify</a>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">☰</button>
    <div class="nav-links" id="navLinks">
        <a href="/"        class="nav-link">Dashboard</a>
        <a href="/rent" class="nav-link">Rent a Car</a>
        <a href="/return"  class="nav-link">Return</a>
        <a href="/history" class="nav-link">History</a>
        <a href="/charts"  class="nav-link nav-charts">📊 Charts</a>
        <a href="/cars"    class="nav-link nav-manage">⚙ Manage</a>
    </div>
</nav>

<main class="main-content">
    <div th:replace="${content}"><!-- page content --></div>
</main>

<footer class="footer">
    <p>Built by <strong>Bikash Talukder</strong> &nbsp;·&nbsp; Rentify v2.0 &nbsp;·&nbsp; Java + Spring Boot</p>
</footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
